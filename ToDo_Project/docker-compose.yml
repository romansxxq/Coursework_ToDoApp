services:
  db:
    image: postgres:16
    container_name: todo_db
    environment:
      POSTGRES_DB: todoapp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change_me_strong_password
    ports:
      - "5432:5432"
    volumes:
      - todo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todoapp_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo_web
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=todoapp_db;Username=postgres;Password=change_me_strong_password
      BotSettings__Token: 8686311828:AAGwFRmmkhW6SGcWDeA6_pbd7aTpaJzc_Z0
    ports:
      - "8080:8080"
    volumes:
      - todo_dpkeys:/root/.aspnet/DataProtection-Keys
    depends_on:
      db:
        condition: service_healthy

volumes:
  todo_pgdata:
  todo_dpkeys: